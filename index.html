<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <h1>ExpenseTracker</h1>
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
            
            <div class="dashboard-grid">
                <div class="balance-card global-balance">
                    <p>Total Balance</p>
                    <h2 id="total-balance">$0.00</h2>
                </div>
                
                <div class="balance-card month-summary" id="month-summary-card">
                    <p>This Month (<span id="current-month-label"></span>)</p>
                    <div class="month-stats">
                        <div class="stat">
                            <span class="stat-label">Income</span>
                            <span class="stat-value income" id="month-income">+$0.00</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Expense</span>
                            <span class="stat-value expense" id="month-expense">-$0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <!-- Settings & Limits -->
            <section class="glass-panel settings-section">
                <div class="input-group">
                    <label for="monthly-limit">Alert me if an expense or monthly total exceeds ($):</label>
                    <input type="number" id="monthly-limit" placeholder="E.g., 1000" min="0" step="10">
                </div>
            </section>

            <!-- Chart Section -->
            <section class="glass-panel chart-section">
                <h3>Spending Overview</h3>
                <div class="chart-container">
                    <canvas id="expenseChart"></canvas>
                </div>
            </section>

            <!-- Form Section -->
            <section class="glass-panel form-section">
                <h3>Add Transaction</h3>
                <form id="transaction-form">
                    <div class="input-group">
                        <label for="item-name">Item Name</label>
                        <input type="text" id="item-name" placeholder="E.g., Groceries" required>
                    </div>
                    <div class="input-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required>
                    </div>

                    <div class="input-group radio-group">
                        <label class="radio-label">
                            <input type="radio" name="transaction-type" value="expense" checked> Expense
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="transaction-type" value="income"> Income
                        </label>
                    </div>

                    <div class="category-wrapper">
                        <div class="input-group flex-fill">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <!-- Categories dynamically loaded here -->
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn">Add Transaction</button>
                </form>

                <div class="custom-category-box">
                    <h4>Add Custom Category</h4>
                    <div class="category-creator">
                        <input type="text" id="new-cat-name" placeholder="Category Name">
                        <input type="color" id="new-cat-color" value="#8b5cf6" title="Choose Category Color">
                        <button type="button" class="btn btn-small" id="add-cat-btn">Add</button>
                    </div>
                </div>
            </section>

            <!-- Transactions List Section -->
            <section class="glass-panel list-section">
                <div class="list-header">
                    <h3>History</h3>
                    <div class="sort-group">
                        <label for="sort-by">Sort:</label>
                        <select id="sort-by">
                            <option value="newest">Date (Newest)</option>
                            <option value="oldest">Date (Oldest)</option>
                            <option value="highest">Amount (Highest)</option>
                            <option value="lowest">Amount (Lowest)</option>
                            <option value="category">Category (A-Z)</option>
                        </select>
                    </div>
                </div>
                <ul id="transaction-list" class="transaction-list">
                    <!-- Transactions dynamically inserted -->
                </ul>
            </section>
        </main>
    </div>

    <!-- Chart.js library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
